<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="clientsHeader">
        <h1 class="tenX">10X </h1>
        <h1 class="crm">CRM</h1>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clients.html">Clients</a></li>
            <li><a href="#">Profile</a></li>
        </ul>
        <button id="themeToggleBtn">🌙 Dark Mode</button>
        <button id="logoutBtn"  style="padding: 0 2%;">Logout</button> 
    </header>
    <main class="clientMain">
        <div class="addClientDiv">
            <h1 style="color: #7250FC; font-family: Plus Jakarta Sans, sans-serif;">Clients</h1>
            <button id="openModalBtn">+ Add Client</button>
            
            <div class="modal" id="clientModal">
                <div class="modal-content">
                    <h2>Add Client</h2>
                    <form id="addClientForm" novalidate>
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Name">
                            <span class="error-message" id="name-error"></span>
                        </div>

                        <div class="form-group">
                            <input type="email" name="email" placeholder="Email">
                            <span class="error-message" id="email-error"></span>
                        </div>

                        <div class="form-group">
                            <input type="text" name="phone" placeholder="Phone (optional)">
                            <span class="error-message" id="phone-error"></span>
                        </div>

                        <div class="form-group">
                            <input type="text" name="company" placeholder="Company (optional)">
                            <span class="error-message" id="company-error"></span>
                        </div>

                        <div class="form-group">
                            <input type="text" name="dealValue" placeholder="Deal Value">
                            <span class="error-message" id="dealValue-error"></span>
                        </div>

                        <div class="form-group">
                            <select name="status">
                                <option value="">Select status</option>
                                <option value="New">New</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Won">Won</option>
                                <option value="Lost">Lost</option>
                            </select>
                            <span class="error-message" id="status-error"></span>
                        </div>

                        <button type="submit">Add Client</button>
                        <button type="button" id="cancelModalBtn">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div id="clientStatus" class="clientStatus">

            <input type="text" id="searchInput" placeholder="Search clients...">

            <div class="filterChips">
                <button class="chip active" data-status="All">All</button>
                <button class="chip" data-status="Lead">Lead</button>
                <button class="chip" data-status="Contacted">Contacted</button>
                <button class="chip" data-status="Won">Won</button>
                <button class="chip" data-status="Lost">Lost</button>
            </div>

            <select id="sortSelect">
                <option value="newest">Newest first</option>
                <option value="nameAsc">Name A → Z</option>
                <option value="dealValue">Deal value</option>
            </select>

        </div>

        <p class="status" id="loadStatus"></p>         <!--this is used by client.js function renderClients() while client cards are loading-->
        
        <div class="clients" id="clientsList">         <!--this div is filled Dynamically also using client.js function renderClients()-->
        </div>
        

        
        

        <div class="detailModal" id="clientDetailModal">
            <div class="modal-content">
                <button type="button" id="closeDetailBtn" class="closeBtn">×</button>

                <p><strong id="detailName"></strong></p>
                <div class="detailMeta">
                    <p id="detailCompany"></p>
                    <p id="detailEmail"></p>
                    <p id="detailPhone"></p>
                    <p id="detailStatus"></p>
                    <p id="detailDealValue"></p>
                    <p id="detailSince"></p>
                </div>

                <hr>

                <h3>Notes</h3>
                <ul id="notesList"></ul>

                <div class="addNoteRow">
                    <input type="text" id="newNoteInput" placeholder="Add a note...">
                    <button type="button" id="addNoteBtn">Add Note</button>
                </div>

                <hr>

                <button type="button" id="remindBtn">Remind me in 1 min</button>
            </div>
        </div>

    </main>

    <script src="JS/data.js"></script>
    <script src="JS/validation.js"></script>
    <script src="JS/clients.js"></script>
</body>
</html>
