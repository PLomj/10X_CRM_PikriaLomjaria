<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex;    flex-direction: row;  margin: 0 25%;">
        <h1 class="tenX">10X </h1>
        <h1 class="crm">CRM</h1>

    </div>
    <main style="margin: 10% 25% 0 25%;">
        
        <div>
            <h3>Create Your Account</h3>
            <form id="newClientForm">
                <div class="form-group">
                    <input type="text" name="fullName"  placeholder="Full Name"  required>
                    <span class="error-message" id="fullName-error"></span>
                </div>

                <div class="form-group">
                    <input type="text" name="email"   placeholder="Email"  required>
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <input type="text" name="company"  placeholder="Company (optional)">
                    <span class="error-message" id="company-error"></span>
                </div>

                <div class="form-group">
                    <input type="Password" name="password"  placeholder="Password"  required>
                    <span class="error-message" id="password-error"></span>
                </div>

                <div class="form-group">
                    <input type="Password" name="confirmPassword"  placeholder="Confirm Password"  required>
                    <span class="error-message" id="confirmPassword-error"></span>
                </div>

                <button type="submit">Create Account</button>
            </form>
            <a href="index.html"><p>Already have an account? Log In</p></a>
        </div>

        <div id="toast" class="toast"></div>
    </main>


    <script src="JS/data.js"></script>
    <script src="JS/validation.js"></script>
    <script src="JS/signup.js"></script>

</body>
</html>
